name: Release

on:
  push:
    branches: [main]

# Cancel superseded release runs on the same branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR and git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets are present, and
      # publishes to npm once that PR is merged (i.e. when versions change).
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"